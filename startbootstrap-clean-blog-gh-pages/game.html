<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Snake Game</title>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #1e1e2f;
        color: white;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
    }

    h1 {
        color: #b892ff;
        margin-bottom: 5px;
    }

    canvas {
        background: #111;
        border: 3px solid #b892ff;
        border-radius: 10px;
    }

    #score {
        margin: 10px;
        font-size: 18px;
    }

    .buttons {
        margin-top: 10px;
        display: flex;
        gap: 10px;
    }

    button {
        padding: 10px 15px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        background: #b892ff;
        font-weight: bold;
    }

    button:hover {
        background: #a06bff;
    }

    #gameOver {
        position: absolute;
        background: rgba(0,0,0,0.85);
        padding: 20px;
        border-radius: 10px;
        display: none;
        text-align: center;
    }
</style>
</head>

<body>

<h1>🐍 Snake Game</h1>
<div id="score">Score: 0</div>

<canvas id="game" width="400" height="400"></canvas>

<div class="buttons">
    <button id="startBtn" onclick="toggleGame()">Start</button>
    <button onclick="restartGame()">Restart</button>
</div>

<div id="gameOver">
    <h2>Game Over</h2>
    <p id="finalScore"></p>
    <button onclick="restartGame()">Play Again</button>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const grid = 20;

let running = false;
let gameOver = false;

let score = 0;
let count = 0;

let snake = {
    x: 160,
    y: 160,
    dx: grid,
    dy: 0,
    cells: [],
    maxCells: 4
};

let apple = {
    x: 320,
    y: 320
};

function random(min, max) {
    return Math.floor(Math.random() * (max - min)) + min;
}

function toggleGame() {
    if (gameOver) return;

    running = !running;
    document.getElementById("startBtn").innerText = running ? "Pause" : "Start";

    if (running) requestAnimationFrame(loop);
}

function loop() {
    if (!running) return;

    requestAnimationFrame(loop);

    if (++count < 6) return;
    count = 0;

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // move snake
    snake.x += snake.dx;
    snake.y += snake.dy;

    // WALL COLLISION (GAME OVER)
    if (
        snake.x < 0 ||
        snake.x >= canvas.width ||
        snake.y < 0 ||
        snake.y >= canvas.height
    ) {
        endGame();
        return;
    }

    snake.cells.unshift({ x: snake.x, y: snake.y });

    if (snake.cells.length > snake.maxCells) {
        snake.cells.pop();
    }

    // draw apple
    ctx.fillStyle = "#ff4d6d";
    ctx.fillRect(apple.x, apple.y, grid - 2, grid - 2);

    // draw snake
    ctx.fillStyle = "#b892ff";

    snake.cells.forEach((cell, index) => {
        ctx.fillRect(cell.x, cell.y, grid - 2, grid - 2);

        // apple collision
        if (cell.x === apple.x && cell.y === apple.y) {
            snake.maxCells++;
            score++;
            document.getElementById("score").innerText = "Score: " + score;

            apple.x = random(0, 20) * grid;
            apple.y = random(0, 20) * grid;
        }

        // self collision
        for (let i = index + 1; i < snake.cells.length; i++) {
            if (cell.x === snake.cells[i].x && cell.y === snake.cells[i].y) {
                endGame();
            }
        }
    });
}

function endGame() {
    running = false;
    gameOver = true;

    document.getElementById("finalScore").innerText = "Score: " + score;
    document.getElementById("gameOver").style.display = "block";
    document.getElementById("startBtn").innerText = "Start";
}

function restartGame() {
    score = 0;
    count = 0;
    running = false;
    gameOver = false;

    snake = {
        x: 160,
        y: 160,
        dx: grid,
        dy: 0,
        cells: [],
        maxCells: 4
    };

    apple = {
        x: random(0, 20) * grid,
        y: random(0, 20) * grid
    };

    document.getElementById("score").innerText = "Score: 0";
    document.getElementById("gameOver").style.display = "none";
    document.getElementById("startBtn").innerText = "Start";

    ctx.clearRect(0, 0, canvas.width, canvas.height);
}

document.addEventListener("keydown", (e) => {
    if (!running) return;

    if (e.key === "ArrowLeft" && snake.dx === 0) {
        snake.dx = -grid;
        snake.dy = 0;
    } else if (e.key === "ArrowUp" && snake.dy === 0) {
        snake.dx = 0;
        snake.dy = -grid;
    } else if (e.key === "ArrowRight" && snake.dx === 0) {
        snake.dx = grid;
        snake.dy = 0;
    } else if (e.key === "ArrowDown" && snake.dy === 0) {
        snake.dx = 0;
        snake.dy = grid;
    }
});
</script>

</body>
</html>
